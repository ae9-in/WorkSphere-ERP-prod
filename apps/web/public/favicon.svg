<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Vibrant Violet-Indigo to Deep Navy Gradient -->
    <linearGradient id="sphereGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A88BFF" />
      <stop offset="40%" stop-color="#5B3CF5" />
      <stop offset="100%" stop-color="#1E1F4B" />
    </linearGradient>
    <!-- Top-Left Highlight Sheen -->
    <linearGradient id="sphereHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Base Sphere -->
  <circle cx="50" cy="50" r="46" fill="url(#sphereGrad)" />
  
  <!-- Glossy Highlight Sheen -->
  <circle cx="50" cy="50" r="46" fill="url(#sphereHighlight)" />
  
  <!-- W Fusion path -->
  <path
    d="M 28 20 C 18 45 18 72 35 80 C 38 81 41 80 43 76 C 47 60 48 45 50 30 C 52 45 53 60 57 76 C 59 80 62 81 65 80 C 82 72 82 45 72 20 C 68 20 66 22 66 24 C 75 45 74 68 62 72 C 60 72 59 71 58 68 C 54 50 52 42 50 38 C 48 42 46 50 42 68 C 41 71 40 72 38 72 C 26 68 25 45 34 24 C 34 22 32 20 28 20 Z"
    fill="#FFFFFF"
  />
</svg>
